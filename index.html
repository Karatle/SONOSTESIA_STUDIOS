function updateVisuals() {

	for(let i = 0; i < particleSystems.length; i++) {

		ps = particleSystems[i]
		s = synthekindas[i]
		//values--------------------------------
		ps.life = constrain(6 * (s.filterVis.filterEnvDepthKnob.knobPos + (1 - s.filterVis.filterKnob.knobPos) + s.effects.reverb.roomsizeKnob.knobPos + s.envVol.envSliders.envSlider_s.sliderPos), 2, 30)
		ps.lifeVar = constrain(s.source.modKnob.knobPos, .1, 1)

		//quantize final position
		ps.quantPosX = (s.synthMaster.panKnob.knobPos * (s.effects.distortion.mixKnob.knobPos + map(s.source.waveType.shape, 0, 3, 0, .4))) * .05
		ps.quantPosY = (s.synthMaster.panKnob.knobPos * (s.effects.distortion.distortionKnob.knobPos + map(s.source.modType.shape, 0, 3, 0, .2))) * .05

		//color
		ps.hSeed = 2
		ps.hPhase = s.source.modKnob.knobPos * .05
		// ps.hMin = constrain(map(s.synthMaster.panKnob.knobPos, 0.25, 0.75, 0, 255) - map((s.filterVis.filterResonanceKnob.knobPos + (1 - s.source.noiseVol.knobPos)), 0, 2, 0, 255 / 2), 0, 255)
		// ps.hMax = constrain(map(s.synthMaster.panKnob.knobPos, 0.25, 0.75, 0, 255) + map((s.filterVis.filterResonanceKnob.knobPos + (1 - s.source.noiseVol.knobPos)), 0, 2, 0, 255 / 2), 0, 255)
		ps.hMin = map(s.synthMaster.panKnob.knobPos, 0.25, 0.75, -.001, .001) - map((s.filterVis.filterResonanceKnob.knobPos), 0, 1, 0, .0003)
		ps.hMax = map(s.synthMaster.panKnob.knobPos, 0.25, 0.75, -.001, .001) + map((s.filterVis.filterResonanceKnob.knobPos), 0, 1, 0, .0003)
		ps.hStep = s.lfo.lfo1.lfoDepthKnob.knobPos * .25
		ps.hCycleSpeed = map(s.filterVis.filterResonanceKnob.knobPos, 0, 1, 0.0002, .002)

		ps.sSeed = 23
		ps.sPhase = map(s.source.modKnob.knobPos, 0, 1, .5, 5)
		// ps.sPhase = s.source.modKnob.knobPos * .05
		ps.sMin = (1 - s.source.noiseVol.knobPos) * 255
		ps.sMax = s.source.oscVol.knobPos * 255
		ps.sStep = s.lfo.lfo2.lfoDepthKnob.knobPos * .25

		ps.bPhase = s.source.modKnob.knobPos + s.source.noise.noiseShape + s.effects.delay.feedbackKnob.knobPos * .05
		ps.bMin = s.filterVis.filterEnvDepthKnob.knobPos + s.envVol.envSliders.envSlider_d.sliderPos * 255
		ps.bMax = 130 + (s.source.oscVol.knobPos * 125)
		ps.bStep = s.lfo.lfo2.type.shape * .1

		ps.colFadeInOut = constrain(s.envVol.envSliders.envSlider_a.sliderPos * s.envFilter.envSliders.envSlider_a.sliderPos * 2, 0, 1)

		//respawnPos
		ps.initOffsetXPhase = map(s.envFilter.envSliders.envSlider_s.sliderPos, 0, 1, 0, .05)
		ps.initOffsetXMin = -map(s.synthMaster.volKnob.knobPos, 0, 1, 1, 1.5) * width / 4
		ps.initOffsetXMax = map(s.synthMaster.volKnob.knobPos, 0, 1, 1, 1.5) * width / 4
		ps.initOffsetXStep = 0

		ps.initOffsetYPhase = map(s.envFilter.envSliders.envSlider_s.sliderPos, 0, 1, 0, .05)
		ps.initOffsetYMin = -map(s.synthMaster.volKnob.knobPos, 0, 1, 1, 1.5) * width / 4
		ps.initOffsetYMax = map(s.synthMaster.volKnob.knobPos, 0, 1, 1, 1.5) * width / 4
		ps.initOffsetYStep = 0

		//directions
		ps.dirXSpeed = s.filterVis.filterEnvDepthKnob.knobPos * .007
		ps.dirXPhase = s.filterVis.filterKnob.knobPos + sequencer.bpmKnob.knobPos + s.effects.phaser.mixKnob.knobPos * .1
		ps.dirXMin = -sequencer.bpmKnob.knobPos * 2
		ps.dirXMax = sequencer.bpmKnob.knobPos * 2
		ps.dirXStep = constrain(constrain(map(s.source.harmonicityKnob.knobPos, 0, .5, 0, .25), 0, .25) + map(s.source.modType.shape, 0, 3, 0, .5), 0, 1)

		ps.dirYSpeed = s.filterVis.filterEnvDepthKnob.knobPos * .007
		ps.dirYPhase = s.filterVis.filterKnob.knobPos + sequencer.bpmKnob.knobPos + s.effects.phaser.mixKnob.knobPos * .1
		ps.dirYMin = -sequencer.bpmKnob.knobPos * 2
		ps.dirYMax = sequencer.bpmKnob.knobPos * 2
		ps.dirYStep = constrain(constrain(map(s.source.harmonicityKnob.knobPos, 0, .5, 0, .25), 0, .25) + map(s.source.waveType.shape, 0, 3, 0, .5), 0, 1)

		//scale
		ps.scalePhase = s.effects.reverb.roomsizeKnob.knobPos
		ps.scaleMin = s.envFilter.envSliders.envSlider_s.sliderPos
		ps.scaleMax = (s.envVol.envSliders.envSlider_s.sliderPos + .5) * 10
		ps.scaleStep = s.effects.delay.mixKnob.knobPos * .5

		//curl
		ps.curlAmp = sequencer.bpmKnob.knobPos * 3
		ps.curlPosxMult = s.effects.phaser.resKnob.knobPos * .02
		ps.curlPosyMult = s.effects.vibrato.mixKnob.knobPos * .02
		ps.curlPeriod = s.effects.delay.feedbackKnob.knobPos * .01
		// ps.curlAmount = constrain(1 - s.filterVis.filterResonanceKnob.knobPos, 0.001, .5)
		ps.curlAmount = map(.5 - constrain(s.filterVis.filterResonanceKnob.knobPos + s.envVol.envSliders.envSlider_a.sliderPos, 0, 1), 0, 1, .001, 1)
		ps.curlStep = s.effects.vibrato.mixKnob.knobPos * .5

		ps.envVolVal = s.synth.ampEnv.value
		ps.envFilterVal = s.synth.filterEnv.value
		ps.lfo1Freq = s.synth.lfo1Freq
		ps.lfo2Freq = s.synth.lfo2Freq
		ps.lfo1Amp = s.lfo.lfo1.lfoDepthKnob.knobPos
		ps.lfo2Amp = s.lfo.lfo2.lfoDepthKnob.knobPos
		ps.lfo1Dist = s.lfo.lfo1.lfoDepthKnob.knobPos * s.effects.distortion.distortionKnob.knobPos
		ps.lfo1Filter = s.lfo.lfo1.lfoDepthKnob.knobPos * s.filterVis.filterKnob.knobPos
		ps.lfo2Noise = s.lfo.lfo2.lfoDepthKnob.knobPos * constrain(s.source.noiseVol.knobPos * 2, 0, 1)
	}
}

		}

	saveUserPreset()
}

function importData(file) {
	let json = file.data
	for(let i = 0; i < json.settingsSynth.length; i++) {
		j = json.settingsSynth[i]

		synthekindas[i].settingsSynth = j
		synthekindas[i].updateControls()
	}

	sequencer.sequencerData.sequencerSettings = json.sequencer.sequencerSettings
	sequencer.loadData()
	for(let i = 0; i < json.sequencer.trackData.length; i++) {
		sa = json.sequencer.trackData[i].active
		sn = json.sequencer.trackData[i].note
		sc = json.sequencer.trackData[i].chord

		sequencer.sequencerTracks[i].trackData.active = sa
		sequencer.sequencerTracks[i].trackData.note = sn
		sequencer.sequencerTracks[i].trackData.chord = sc
		sequencer.sequencerTracks[i].loadTrackData()
	}

}
function importPresetData(path){

	let presetData = path
	for(let i = 0; i < presetData.settingsSynth.length; i++) {
		j = presetData.settingsSynth[i]
		
		synthekindas[i].settingsSynth = j
		synthekindas[i].updateControls()
	}

	sequencer.sequencerData.sequencerSettings = presetData.sequencer.sequencerSettings
	sequencer.loadData()
	for(let i = 0; i < presetData.sequencer.trackData.length; i++) {
		sa = presetData.sequencer.trackData[i].active
		sn = presetData.sequencer.trackData[i].note
		sc = presetData.sequencer.trackData[i].chord

		sequencer.sequencerTracks[i].trackData.active = sa
		sequencer.sequencerTracks[i].trackData.note = sn
		sequencer.sequencerTracks[i].trackData.chord = sc
		sequencer.sequencerTracks[i].loadTrackData()
	}
}

function noiseSpeedy(time, seed, speed, phase, desiredMin, desiredMax, step) {

	stepping = 1 / constrain(step, 0.0001, 1)
	// noiseDetail(1, .5)
	noiseVal = noise(((time * speed) + phase) + (seed * 4123341.1231))
	noiseVal = round(noiseVal * stepping) / stepping

	noiseVal = map(noiseVal, 0, 1, desiredMin, desiredMax)

	return (noiseVal)
}

function curlNoise(time, amplitude, x, y, period, amount, step) {
	let epsilon = amount

	let n1 = noise(x + epsilon + (time * period), y + (time * period)) * amplitude
	let n2 = noise(x - epsilon + (time * period), y + (time * period)) * amplitude

	let a = (n1 - n2) / (2 * epsilon)

	n1 = noise(x + (time * period), y + epsilon + (time * period)) * amplitude
	n2 = noise(x + (time * period), y - epsilon + (time * period)) * amplitude

	let b = (n1 - n2) / (2 * epsilon)

	return (createVector(quantizePosition(b, step, 1), quantizePosition(-a, step, 1)))
}

function quantizePosition(input, quantVal, maxPos) {
	quantizeVal = 1 / constrain(quantVal, .0001, 1)
	return ((round((input / maxPos) * quantizeVal) / quantizeVal) * maxPos)
}

class ParticleSystem {
	constructor(posx, posy, id) {

		this.steps = 1
		this.max = 100
		this.time = 0

		this.id = id 
		this.randSeed = random(0, 5000)

		this.particles = []

		for(let i = 0; i < this.max; i++) {

			this.initPos = createVector(sin(map(i, 0, this.max - 1, -PI, PI)) * 100, cos(map(i, 0, this.max - 1, -PI, PI)) * 100)

			this.particles.push(new Particle(this.time, this.initPos, 1, color(10, 255, 255), i, random(0, .24), this.id))
		}
		//values--------------------------------
		this.life
		this.lifeVar

		//quantize final position
		this.quantPosX
		this.quantPosY

		//color
		this.hSeed
		this.hPhase
		this.hMin
		this.hMax
		this.hStep
		this.hCycleSpeed

		this.sSeed
		this.sPhase
		this.sMin
		this.sMax
		this.sStep

		this.bSeed
		this.bPhase
		this.bMin
		this.bMax
		this.bStep

		this.colFadeInOut

		//respawnPos
		this.initOffsetXSeed
		this.initOffsetXPhase
		this.initOffsetXMin
		this.initOffsetXMax
		this.initOffsetXStep

		this.initOffsetYSeed
		this.initOffsetYPhase
		this.initOffsetYMin
		this.initOffsetYMax
		this.initOffsetYStep

		//directions
		this.dirXSeed
		this.dirXSpeed
		this.dirXPhase
		this.dirXMin
		this.dirXMax
		this.dirXStep

		this.dirYSeed
		this.dirYSpeed
		this.dirYPhase
		this.dirYMin
		this.dirYMax
		this.dirYStep

		//scale
		this.scaleSeed
		this.scalePhase
		this.scaleMin
		this.scaleMax
		this.scaleStep

		//curl
		this.curlAmp
		this.curlPosxMult
		this.curlPosyMult
		this.curlPeriod
		this.curlAmount
		this.curlStep

		this.envVolVal
		this.envFilterVal
		this.lfo1Freq
		this.lfo2Freq
		this.lfo1Amp
		this.lfo2Amp
		this.lfo1Dist
		this.lfo2Noise
		this.lfo1Filter

		this.envAdd

		//values--------------------------------
	}

	display() {
		push()

		this.time++

		this.envAdd = .5 + (this.envVolVal + this.envFilterVal)

		for(let i = 0; i < this.max - 1; i++) {


			this.p = this.particles[i]
			this.p.time = this.time

			// this.p.h = noiseSpeedy(this.time, i * this.hSeed + this.id, .003, i * this.hPhase, this.hMin, this.hMax, this.hStep) + fract(this.time * this.hCycleSpeed) * 255
			// this.p.h = fract(this.time * this.hCycleSpeed) * 255
			this.p.h = fract((.25 * this.randSeed) + this.time * (this.hCycleSpeed + noiseSpeedy(this.time, i * this.hSeed + this.id, .003, i * this.hPhase, this.hMin, this.hMax, this.hStep))) * 255 + map(sin((this.time * (this.lfo1Freq/36))), -1, 1, -100 * this.lfo1Amp, 100 * this.lfo1Amp)
			// this.p.h = fract(this.time * .001 + map(sin(this.time * (this.lfo1Freq / 360)), -1, 1, -this.lfo1Amp, this.lfo1Amp)) * 255 
			this.p.s = noiseSpeedy(this.time, i + this.randSeed, .001, i * .001, 0, this.sMax * map(sin((this.time * (this.lfo2Freq/36)) * .54), -1, 1, 1 - this.lfo1Dist, 1), this.sStep)
			// this.p.s = noiseSpeedy(this.time, i, .001, i * .001, 0, 255, 0)
			this.p.b = noiseSpeedy(this.time, 0 + this.randSeed, .001, i * this.bPhase, this.bMin, this.bMax * map(sin((this.time * (this.lfo2Freq/36))), -1, 1, 1-this.lfo2Amp, 1), this.bStep)

			this.p.initOffsetx = noiseSpeedy(this.time, 0 + this.randSeed, .001, i * this.initOffsetXPhase, -width / 4, width / 4, this.initOffsetXStep)
			this.p.initOffsety = noiseSpeedy(this.time, 20 + this.randSeed, .001, i * this.initOffsetYPhase, -width / 4, width / 4, this.initOffsetYStep)

			this.xDir = noiseSpeedy(this.time, 0 + this.randSeed, this.dirXSpeed + (i * 0.00), i * .01, this.dirXMin * this.envAdd, this.dirXMax * this.envAdd, this.dirXStep)
			this.yDir = noiseSpeedy(this.time, 100 + this.randSeed, this.dirYSpeed + (i * 0.00), i * .01, this.dirYMin * this.envAdd, this.dirYMax * this.envAdd, this.dirYStep)

			this.p.scale = noiseSpeedy(this.time, 0 + this.randSeed, .001 + (i * 0), i * this.scalePhase, this.scaleMin, this.scaleMax, this.scaleStep) * (.5 + this.envFilterVal) + map(sin((this.time * (this.lfo1Freq/40))), -1, 1, 0, 20 * this.lfo1Filter)

			this.p.life = this.life
			this.p.lifeVar = this.lifeVar
			this.p.colFadeAmount = this.colFadeInOut

			this.p.quantValx = this.quantPosX + map(sin((this.time * (this.lfo1Freq/36))), -1, 1, 0, .2 * this.lfo2Noise)
			this.p.quantValy = this.quantPosY + map(sin((this.time * (this.lfo2Freq/36))), -1, 1, 0, .2 * this.lfo2Noise)

			this.p.pos.x += this.xDir
			this.p.pos.y += this.yDir
			this.p.pos.add(curlNoise(this.time, this.curlAmp, this.p.pos.x * 0.005, this.p.pos.y * 0.005, 0.0001, this.curlAmount, this.curlStep))
			this.p.display()
		}
		pop()
	}
}

class Particle {
	constructor(time, pos, scale, color, id, initLifeVar, parentId) {
		// this.posx = posx
		// this.posy = posy
		this.layer
		this.pos = pos
		this.time = time
		// this.initPosx = this.pos.x
		// this.initPosy = this.pos.y
		this.pos.x = this.initPosx
		this.pos.y = this.initPosy
		this.initOffsetx = 1
		this.initOffsety = 1
		this.scale = scale
		this.color = color
		this.quantVal = 0
		this.reset = false
		this.id = id
		this.parentId = parentId
		this.life = 10
		this.lifeCounter = 0
		this.lifeVariance = initLifeVar
		this.lifeVar
		this.h
		this.s
		this.b

	}
	display() {
		particleRender.noStroke()

		this.reset = false

		if(this.time < 2) { //Initialize custom start position
			this.reset = true
		}

		this.lifeCounter += (1 / (60 * this.life * (1 - this.lifeVariance)))

		if(this.lifeCounter >= 1) {
			this.lifeVariance = random(0, this.lifeVar)
			this.reset = true
			this.lifeCounter = 0
		}
		if(this.reset == true) {
			this.pos.x = this.initOffsetx
			this.pos.y = this.initOffsety
			// this.lifeVariance = random(0, 1)
		}
		// this.color = color(this.h, this.s, this.b * (1-this.lifeCounter))
		// this.color = color(this.h, this.s, this.b * ((1-this.colFadeAmount) + this.colorFadeInOut(this.lifeCounter)))
		this.color = color(this.h, this.s, this.b, constrain((1 - this.colFadeAmount) + this.colorFadeInOut(this.lifeCounter), 0, 1) * 255)
		particleRender.fill(this.color)

		this.posxp = quantizePosition(this.pos.x, this.quantValx, 200)
		this.posyp = quantizePosition(this.pos.y, this.quantValy, 200)

		particleRender.circle(this.posxp + width / 2, this.posyp + height / 2, this.scale)
	}
	colorFadeInOut(input) {
		this.inMap = map(input, 0, 1, -PI / 2, (3 * PI) / 2)
		return (map(sin(this.inMap), -1, 1, 0, 1))
	}
}

		//"""""""""""""""""""""""""""""""""""

		//–––––––––––––––––––––––––––source controls––––––––––––––––––––


		//values to cache"""""""""""""""""""""""""""""""""""

		// this.envVol.noteLength = this.noteLength

		this.synth.rf = this.envFilter.envSliders.r
		//"""""""""""""""""""""""""""""""""""


		//–––––––––––––––––––––––––––filter––––––––––––––––––––

		//values to cache"""""""""""""""""""""""""""""""""""
		this.filterKnobEase = pow(this.filterVis.filterKnob.knobVal, 2)
		this.filter = map(this.filterKnobEase, 0, 1, 2, 2000)
		this.filterResonance = map(this.filterVis.filterResonanceKnob.knobVal, 0, 1, 0, 40)

		this.synth.filterEnvDepth = map(this.filterVis.filterEnvDepthKnob.knobVal, 0, 1, 0, 8)

		this.cutoffEnvVal = this.synth.filterEnv.value

				this.posx - standardUnit, this.posy - standardUnit * 2.35 + curveUnit)

			vertex(this.posx - standardUnit * .2, this.posy + standardUnit * 3.65)
			vertex(this.posx - standardUnit + curveUnit, this.posy + standardUnit * 3.65)

			bezierVertex(this.posx - standardUnit + curveUnit * .5, this.posy + standardUnit * 3.65,

				this.posx - standardUnit, this.posy + standardUnit * 3.65 + curveUnit)

				this.posx - standardUnit + curveUnit, this.posy + standardUnit * 6.85)

			vertex(this.posx + standardUnit * 3.9 - curveUnit, this.posy + standardUnit * 6.85)
			bezierVertex(this.posx + standardUnit * 3.9 - curveUnit * .5, this.posy + standardUnit * 6.85,
				this.posx + standardUnit * 3.9, this.posy + standardUnit * 6.85 - curveUnit * .5,
				this.posx + standardUnit * 3.9, this.posy + standardUnit * 6.85 - curveUnit)
			vertex(this.posx + standardUnit * 3.9, this.posy + standardUnit * 6.3)
			endShape()
			fill(globalWhite)
			triangle(this.posx + standardUnit * .6, this.posy - standardUnit * 4 + curveUnit * .2,
				this.posx + standardUnit * .6, this.posy - standardUnit * 4 - curveUnit * .2,
				this.posx + standardUnit * .4, this.posy - standardUnit * 4)
			triangle(this.posx - standardUnit, this.posy + standardUnit * 1.55,
				this.posx - standardUnit - curveUnit * .2, this.posy + standardUnit * 1.35,
				this.posx - standardUnit + curveUnit * .2, this.posy + standardUnit * 1.35)
			triangle(this.posx - standardUnit, this.posy + standardUnit * 5.4,
				this.posx - standardUnit - curveUnit * .2, this.posy + standardUnit * 5.2,
				this.posx - standardUnit + curveUnit * .2, this.posy + standardUnit * 5.2)
			pop()
			push()
			beginShape()
			if(this.lfo.lfoSelect.lfoIndex == 0) {
				stroke(globalWhite)
			} else {
				stroke(130)
			}
			vertex(this.posx - standardUnit * .8, this.posy - standardUnit * .4 - curveUnit)
			vertex(this.posx - standardUnit * .8, this.posy - standardUnit * .2 - curveUnit * .5)

			bezierVertex(this.posx - standardUnit * .8, this.posy - standardUnit * .2 - curveUnit * .25,
				this.posx - standardUnit * .8 + curveUnit * .25, this.posy - standardUnit * .2,
				this.posx - standardUnit * .8 + curveUnit * .5, this.posy - standardUnit * .2)

			bezierVertex(this.posx - standardUnit * .8 + curveUnit * .75, this.posy - standardUnit * .2,
				this.posx - standardUnit * .8 + curveUnit * .9, this.posy - standardUnit * .2 + curveUnit * .25,
				this.posx - standardUnit * .8 + curveUnit * .9, this.posy - standardUnit * .2 + curveUnit * .5)

			vertex(this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * .98)


			endShape()
			if(this.lfo.lfoSelect.lfoIndex == 0) {
				fill(globalWhite)

			}
			triangle(this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * .5,

				this.posx - standardUnit * .8 + curveUnit * 1.1, this.posy + standardUnit * .7)

			push()
			beginShape()
			if(this.lfo.lfoSelect.lfoIndex == 1) {
				stroke(globalWhite)
			} else {
				stroke(130)
			}

			vertex(this.posx - standardUnit * .22, this.posy + standardUnit * 3.25 + curveUnit * .5)
			vertex(this.posx - standardUnit * .8 + curveUnit * .5, this.posy + standardUnit * 3.25 + curveUnit * .5)
			bezierVertex(this.posx - standardUnit * .8 + curveUnit * .25, this.posy + standardUnit * 3.25 + curveUnit * .5,
				this.posx - standardUnit * .8, this.posy + standardUnit * 3.25 + curveUnit * .25,
				this.posx - standardUnit * .8, this.posy + standardUnit * 3.25)
			vertex(this.posx - standardUnit * .8, this.posy + standardUnit * 2.68 + curveUnit * .5)

			bezierVertex(this.posx - standardUnit * .8, this.posy + standardUnit * 2.68 + curveUnit * .25,
				this.posx - standardUnit * .8 + curveUnit * .25, this.posy + standardUnit * 2.68,
				this.posx - standardUnit * .8 + curveUnit * .5, this.posy + standardUnit * 2.68)

			bezierVertex(this.posx - standardUnit * .8 + curveUnit * .75, this.posy + standardUnit * 2.68,
				this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * 2.68 - curveUnit * .25,
				this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * 2.68 - curveUnit * .5)

			vertex(this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * 1.86)


			endShape()
			if(this.lfo.lfoSelect.lfoIndex == 1) {
				fill(globalWhite)
			} else {
				fill(130)
			}
			triangle(this.posx - standardUnit * .8 + curveUnit * .9, this.posy + standardUnit * 2.37,
				this.posx - standardUnit * .8 + curveUnit * .7, this.posy + standardUnit * 2.17,
				this.posx - standardUnit * .8 + curveUnit * 1.1, this.posy + standardUnit * 2.17)
			pop()

			push()
			beginShape()
			stroke(globalWhite)
			vertex(this.posx - standardUnit * .2, this.posy - standardUnit * 2.15)
			vertex(this.posx - standardUnit * .8 + curveUnit, this.posy - standardUnit * 2.15)

			bezierVertex(this.posx - standardUnit * .8 + curveUnit * .5, this.posy - standardUnit * 2.15,
				this.posx - standardUnit * .8, this.posy - standardUnit * 2.15 + curveUnit * .5,
				this.posx - standardUnit * .8, this.posy - standardUnit * 2.15 + curveUnit)

			vertex(this.posx - standardUnit * .8, this.posy - standardUnit * .4 - curveUnit)
			bezierVertex(this.posx - standardUnit * .8, this.posy - standardUnit * .4 - curveUnit * .5,
				this.posx - standardUnit * .8 + curveUnit * .5, this.posy - standardUnit * .4,
				this.posx - standardUnit * .8 + curveUnit, this.posy - standardUnit * .4)

			vertex(this.posx - standardUnit * .2, this.posy - standardUnit * .4)
			endShape()
			fill(globalWhite)
			triangle(this.posx - standardUnit * .8 - curveUnit * .2, this.posy - standardUnit * 1.2,
				this.posx - standardUnit * .8, this.posy - standardUnit * 1.4,
				this.posx - standardUnit * .8 + curveUnit * .2, this.posy - standardUnit * 1.2)
			pop()
			pop()
		}
	}

	updateControls() {

		this.effects.reverb.roomsizeKnob.knobPos = this.settingsSynth.effects.reverb.room

class SynthAudio {

	constructor(av = .01, dv = 1, sv = .5, rv = .8,
		af = .01, df = 3, sf = .1, rf = .1, f = 100) {

		this.av = av
		this.dv = dv
		this.sv = sv
		this.rv = rv

		this.af = af
		this.df = df
		this.sf = sf
		this.rf = rf

		this.lfo1Depth = 0
		this.lfo1Freq = 2
		this.lfo2Depth = 0
		this.lfo2Freq = 2

		this.shapes = ["sine", "triangle", "sawtooth", "square"]
		this.noiseShapes = ["white", "pink", "brown"]

		this.filterFreq = 1000
		this.filterRes = 0
		this.filterEnvDepth = 0
		this.noteLenght = this.noteLength

		this.freq = f
		this.freq2 = f
		this.freq3 = f
		this.octave = 1
		this.chordMode = 0
		this.pan = 0

		this.masterVolume
		this.oscVolume
		this.noiseVolume
		this.FMmodIndex
		this.FMharmonicity

		this.reverbRoom
		this.reverbDamp
		this.reverbWET

		this.delayTime
		this.delayFB
		this.delayWET

		this.vibratoFreq
		this.vibratoDepth
		this.vibratoWET

		this.phaserFreq
		this.phaserDepth
		this.phaserRes
		this.phaserWET

		this.distortionAmount
		this.distortionWET

		//–––––––––––––––––––––––––––effects––––––––––––––––––––
		this.reverb = new Tone.Freeverb({
			roomSize: 0,
			dampening: 1000,
			wet: 0
		})
		this.delay = new Tone.FeedbackDelay({
			delayTime: 0,
			feedback: 0,
			wet: 0
		})
		this.phaser = new Tone.Phaser({
			frequency: 0,
			octaves: 0,
			Q: 0,
			wet: 0
		})
		this.vibrato = new Tone.Vibrato({
			frequency: 0,
			depth: 0,
			type: this.shapes[0],
			wet: 0
		})
		this.distortion = new Tone.Distortion({
			distortion: 0,
			wet: 0
		})
		this.distortionNoise = new Tone.Distortion({
			distortion: 0,
			wet: 0
		})

		//–––––––––––––––––––––––––––sources––––––––––––––––––––
		this.volOsc = new Tone.Volume(-24)
		this.volOsc2 = new Tone.Volume(-24)
		this.volOsc3 = new Tone.Volume(-24)

		this.osc = new Tone.FMOscillator({
			frequency: 0,
			type: this.shapes[0],
			modulationType: this.shapes[1],
			harmonicity: 1,
			modulationIndex: 1,
			phase: 1
		})
		this.osc2 = new Tone.FMOscillator({
			frequency: 0,
			type: this.shapes[0],
			modulationType: this.shapes[1],
			harmonicity: 1,
			modulationIndex: 1,
			phase: 1
		})
		this.osc3 = new Tone.FMOscillator({
			frequency: 0,
			type: this.shapes[0],
			modulationType: this.shapes[1],
			harmonicity: 1,
			modulationIndex: 1,
			phase: 1
		})

		this.noise = new Tone.Noise({
			type: this.noiseShapes[0]
		})
		this.volNoise = new Tone.Volume(-24)

		//–––––––––––––––––––––––––––envelopes––––––––––––––––––––
		this.ampEnv = new Tone.AmplitudeEnvelope({
			attack: this.av,
			decay: this.dv,
			sustain: this.sv,
			release: this.rv
		})
		this.filterEnv = new Tone.FrequencyEnvelope({
			attack: this.af,
			decay: this.df,
			sustain: this.sf,
			release: this.rf,
			baseFrequency: this.filterFreq,
			octaves: 4,
		})
		this.feedback = new Tone.FeedbackCombFilter({
			delayTime: 1,
			resonance: .95,
		})
		this.feedbackNoise = new Tone.FeedbackCombFilter({
			delayTime: 0.01,
			resonance: 0
		})

		this.ampEnv.attackCurve = "linear"
		this.ampEnv.decayCurve = "linear"
		this.ampEnv.releaseCurve = "exponential"

		this.filterEnv.attackCurve = "linear"
		this.filterEnv.decayCurve = "linear"
		this.filterEnv.releaseCurve = "exponential"

		//–––––––––––––––––––––––––––filter––––––––––––––––––––
		this.filter = new Tone.Filter({
			frequency: this.filterFreq,
			type: "lowpass",
			roloff: -24,
			Q: 0
		})

		//–––––––––––––––––––––––––––lfos––––––––––––––––––––
		this.lfo1 = new Tone.LFO({
			type: "sine",
			min: 0,
			max: 0,
			phase: 0,
			frequency: 3,
			amplitude: 1,
		})
		this.lfo2 = new Tone.LFO({
			type: "sine",
			min: 0,
			max: 0,
			phase: 0,
			frequency: 3,
			amplitude: 1,
		})
		this.lfo1.start()
		this.lfo2.start()

		//–––––––––––––––––––––––––––other––––––––––––––––––––
		this.panning = new Tone.Panner(this.pan)
		this.limiter = new Tone.Limiter(-24)
		this.comp = new Tone.Compressor(-30, 20)

		//–––––––––––––––––––––––––––signal chain––––––––––––––––––––
		this.lfo1.connect(this.filter.frequency)
		this.filterEnv.connect(this.filter.frequency)

		this.lfo2.connect(this.osc.volume)
		this.lfo2.connect(this.noise.volume)
		this.noise.chain(this.distortionNoise, this.volNoise, this.filter, this.ampEnv) //masterVol to volEnv
		this.osc.chain(this.volOsc, this.filter, this.ampEnv)
		this.osc2.chain(this.volOsc2, this.filter, this.ampEnv) //need seperate dists for all
		this.osc3.chain(this.volOsc3, this.filter, this.ampEnv)

		this.ampEnv.chain(this.distortion, this.vibrato, this.phaser, this.reverb, this.delay, this.comp, this.limiter, this.panning, Tone.Destination)
		//–––––––––––––––––––––––––––post––––––––––––––––––––
		this.waveForm = new Tone.Waveform({
			size: 64,
		})
		this.waveData = []
		this.limiter.connect(this.waveForm)
		this.osc.start()
		this.osc2.start()
		this.osc3.start()
		this.noise.start()
	}

	display() {
		//–––––––––––––––––––––––––––val osc––––––––––––––––––––
		this.osc.modulationIndex.value = this.FMmodIndex
		this.osc.harmonicity.value = this.FMharmonicity

		this.volOsc.volume.value = this.oscVolume
		// this.volOsc2.volume.value = this.oscVolume
		// this.volOsc3.volume.value = this.oscVolume
		this.volNoise.volume.value = this.noiseVolume
		this.panning.pan.value = this.pan

		//–––––––––––––––––––––––––––val envelopes––––––––––––––––––––
		this.ampEnv.attack = this.av
		this.ampEnv.decay = this.dv
		this.ampEnv.sustain = this.sv
		this.ampEnv.release = this.rv

		this.filterEnv.attack = this.af
		this.filterEnv.decay = this.df
		this.filterEnv.sustain = this.sf
		this.filterEnv.release = this.rf
		this.filterEnv.octaves = this.filterEnvDepth

		//–––––––––––––––––––––––––––val lfos––––––––––––––––––––
		this.lfo1.min = constrain(this.filterFreq - (this.filterFreq * 8), 2, 2000)
		this.lfo1.max = this.filterFreq + (this.filterFreq * 8)
		this.lfo1.frequency.value = this.lfo1Freq

		this.lfo2.min = -120
		this.lfo2.max = 0
		this.lfo2.frequency.value = this.lfo2Freq

		//–––––––––––––––––––––––––––val filter––––––––––––––––––––
		this.filter.Q.value = this.filterRes
		// this.feedbackNoise.resonance.value = this.filterFeedback
		// this.feedbackNoise.delayTime.rampTo(1 / this.freq, 0)
		// this.feedback.resonance.value = this.filterFeedback
		// this.feedback.delayTime.rampTo(1 / this.freq, 0)
		this.filter.frequency.value = this.filterFreq
		this.filterEnv.baseFrequency = this.freq

		//–––––––––––––––––––––––––––val effects––––––––––––––––––––
		this.reverb.roomSize.value = this.reverbRoom
		this.reverb.wet.value = this.reverbWET

		this.delay.delayTime.value = this.delayTime
		this.delay.feedback.value = this.delayFB
		this.delay.wet.value = this.delayWET

		this.vibrato.frequency.value = this.vibratoFreq
		this.vibrato.depth.value = this.vibratoDepth
		this.vibrato.wet.value = this.vibratoWET

		this.phaser.frequency.value = this.phaserFreq
		this.phaser.octaves = this.phaserDepth
		this.phaser.Q.value = this.phaserRes
		this.phaser.wet.value = this.phaserWET
		this.phaser.baseFrequency = this.freq + 1 //OFFSET = PHASE

		this.distortion.distortion = this.distortionAmount
		this.distortion.wet.value = this.distortionWET
		this.distortionNoise.distortion = this.distortionAmount
		this.distortionNoise.wet.value = this.distortionWET

		
		if(this.chordMode == 0) {
			// this.osc2.mute = true
			// this.osc3.mute = true
			this.volOsc2.volume.rampTo(-240, .01)
			this.volOsc3.volume.rampTo(-240, .01)
		} else {
			// this.osc2.mute = false
			// this.osc3.mute = false
			this.volOsc2.volume.rampTo(this.oscVolume, .01)
			this.volOsc3.volume.rampTo(this.oscVolume, .01)
		}
		// this.osc2.frequency.value = this.freq2 * this.octave
		// this.osc3.frequency.value = this.freq3 * this.octave
		this.osc.frequency.rampTo(this.freq * this.octave, 0.01)
		this.osc2.frequency.rampTo(this.freq2 * this.octave, 0.01)
		this.osc3.frequency.rampTo(this.freq3 * this.octave, 0.01)

		//–––––––––––––––––––––––––––GATE––––––––––––––––––––

		if(this.gate) {
			this.lfo1.stop()
			this.lfo1.start()
			this.filterEnv.triggerAttackRelease(this.noteLengthFilter)
			this.ampEnv.triggerAttackRelease(this.noteLengthVol)
		}

		//–––––––––––––––––––––––––––update audioWave––––––––––––––––––––
		this.waveData = this.waveForm.getValue()
	}
}

class EnvelopeDraw {

	constructor(posx, posy, sizew, sizeh, label, noteLength, hold, color, brightness = 1) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.color = color
		this.gate = false

		this.sizew = sizew
		this.sizeh = sizeh

		this.val = 0

		this.noteLength = noteLength

		this.sustaincount = 0
		this.sustaincountv = this.sustaincount

		this.attack = false
		this.attackv = this.attack

		this.x = 0
		this.yv = 0

		this.hold = hold

		this.posy = posy
		this.posx = posx
		this.label = label

		this.envSliders = new EnvSliderMenu(this.posx + standardUnit * 3.5, this.posy - standardUnit * .2, scaleUniv)
		this.noteLengthKnob = new Knob(this.posx + standardUnit * 6, this.posy - standardUnit * .3, 1, 1, "HOLD", 0.5)

	}


	display() {

		push()

		this.envSliders.display()
		this.noteLengthKnob.display()
		this.noteLength = map(this.noteLengthKnob.knobPos, 0, 1, .5, 5)

		translate(this.posx, this.posy)
		drawingContext.setLineDash([])
		this.atime = this.envSliders.a
		this.dtime = this.envSliders.d
		this.sustain = this.envSliders.s
		this.rtime = this.envSliders.r

		push()
		noStroke()
		this.color.setAlpha(40)
		fill(this.color)
		rect(0, 0, this.noteLength * standardUnit * this.sizew, -(standardUnit * 1.6) * this.sizeh)
		this.color.setAlpha(255)
		stroke(this.color)
		line(this.noteLength * standardUnit * this.sizew, 0, this.noteLength * standardUnit * this.sizew, -(standardUnit * 1.6) * this.sizeh)
		pop()

		push()
		text(this.label, 0, (-standardUnit * 2.2) * this.sizeh)
		noFill()
		stroke(globalWhite)
		rect(-((standardUnit * .4) * this.sizew), ((standardUnit * .6) * this.sizeh), (standardUnit * 6) * this.sizew, -(standardUnit * 2.6) * this.sizeh)
		noStroke()
		pop()

		drawingContext.setLineDash([5, 5])
		this.stime = constrain(this.noteLength - (this.atime + this.dtime), 0, this.noteLength)

		//timeline lines
		for(let i = 0; i < this.hold; i++) {
			stroke(160)
			strokeWeight(1)
			line(i * standardUnit * this.sizew, 0, i * standardUnit * this.sizew, -(standardUnit * 1.6) * this.sizeh)
			this.t = str(i)
			fill(globalWhite)
			noStroke()
			text(this.t, i * standardUnit * this.sizew, (standardUnit * .4) * this.sizeh)
		}

		if(this.gate) {
			this.visGate = true
			this.attack = true
			this.trigswitch = true
			this.x = 0
			this.val = 0
			this.sustaincount = 0
		}

		this.valv = 0
		this.sustaincountv = 0
		strokeWeight(1.5)
		this.attackv = true

		drawingContext.setLineDash([]);
		beginShape()
		noFill()
		stroke(globalWhite)
		strokeWeight(1.5)

		//curve static
		vertex(0, 0)
		vertex(this.atime * ((standardUnit / 60) * 60) * this.sizew, -(standardUnit * 1.6) * this.sizeh)
		vertex((this.atime + this.dtime) * ((standardUnit / 60) * 60) * this.sizew, -(standardUnit * 1.6) * this.sizeh * this.sustain)
		vertex((this.atime + this.dtime + this.stime) * ((standardUnit / 60) * 60) * this.sizew, -(standardUnit * 1.6) * this.sizeh * this.sustain)
		vertex((this.atime + this.dtime + this.stime + this.rtime) * ((standardUnit / 60) * 60) * this.sizew, 0)
		endShape()

		stroke(globalWhite)
		strokeWeight(5)

		//curve follow
		if(this.visGate) {
			if(this.x < standardUnit * (this.hold - 1)) {
				this.x += standardUnit / 60
			}
			if(this.attack) {
				this.val += 1 / (60 * this.atime)
			}
			if(this.val >= 1) {
				this.attack = false
			}
			if(this.attack == false && this.val > this.sustain && this.dtime > 0) {
				this.val -= (1 - this.sustain) / (60 * this.dtime)
				this.val = constrain(this.val, this.sustain - .001, 1)
			}
			if(this.attack == false && this.dtime == 0 && this.sustaincount < this.stime) {
				this.val = this.sustain
				this.sustaincount += 1 / 60
			}
			if(this.attack == false && this.val < this.sustain) {
				this.sustaincount += 1 / 60
			}
			if(this.sustaincount > this.stime) {
				this.val -= this.sustain / (60 * this.rtime)
			}
			this.val = constrain(this.val, 0, 1)
		}
		this.y = map(this.val, 0, 1, 0, (standardUnit * 1.6))
		point(this.x * this.sizew, -this.y * this.sizeh)

		strokeWeight(1)

		drawingContext.setLineDash([]);
		line(this.x * this.sizew, 0, this.x * this.sizew, -(standardUnit * 1.6) * this.sizeh)

		pop()
	}
}

class EnvSliderMenu {
	constructor(posx, posy, scale, brightness = 1) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.posx = posx
		this.posy = posy

		this.scale = scale

		this.envSlider_s = new EnvSlider(0 + this.posx + spacingSlid * 2, this.posy, this.scale, this.scale, "attack!", this.s, 0, 1)
		this.envSlider_r = new EnvSlider(0 + this.posx + spacingSlid * 3, this.posy, this.scale, this.scale, "attack!", this.r, 0, 3)
	}
	display() {

		translate(this.posx, this.posy + standardUnit * .45)
		rotate(-PI * .2)
		text("attack", 0, 0)
		pop()
		push()
		translate(this.posx + spacingSlid * .88, this.posy + standardUnit * .35)
		rotate(PI * .1)
		text("decay", 0, 0)
		pop()
		push()
		translate(this.posx + spacingSlid * 2, this.posy + standardUnit * .45)
		text("sustain", 0, 0)
		pop()
		push()
		translate(this.posx + spacingSlid * 3.2, this.posy + standardUnit * .55)
		rotate(PI * .1)
		text("release", 0, 0)

		this.d = map(this.envSlider_d.sliderVal, 0, 1, .01, 2)

		this.s = map(this.envSlider_s.sliderVal, 0, 1, 0, 1)
		this.envSlider_r.display()

class EnvSlider {

	constructor(posx, posy, sizew, sizeh, label, defaultVal, min, max, brightness = 1) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh

		this.posy = posy
		this.posx = posx
		this.label = label
		this.min = min
		this.max = max
		this.defaultVal
		this.sliderPos
		this.sliderVal

	}

	display() {

		push()
		translate(this.posx, this.posy)

		drawingContext.setLineDash([]);

		if(mouseDown) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, -this.sliderPos * (standardUnit * 1.6) * this.sizeh) < ((standardUnit * .5) * this.sizew)) {
				this.slidActive = true
				this.deltaMouse = 0
			}
		}
		if(mouseUp == true) {
			this.slidActive = false
		}
		if(this.slidActive) {
			this.sliderPos = -(mouseY - height / 2 - this.posy) / ((standardUnit * 1.6) * this.sizeh)
		}


		noFill()
		stroke(globalWhite)
		push()
		drawingContext.setLineDash([5, 5]);
		line(0, 0, 0, -(standardUnit * 1.6) * this.sizeh)
		pop()

		for(let i = 0; i < 5; i++) {
			line(-5 * this.sizew, -((standardUnit * 1.6) / 4) * this.sizeh * i, 5 * this.sizew, -((standardUnit * 1.6) / 4) * this.sizeh * i)
		}
		push()
		rectMode(CENTER)
		fill(globalWhite)
		this.sliderPos = constrain(this.sliderPos, 0, 1)

		rect(0, -this.sliderPos * (standardUnit * 1.6) * this.sizeh, (standardUnit * .5) * this.sizew, (standardUnit * .15) * this.sizeh)

		pop()
		// this.sliderVal = map(this.sliderPos, -(standardUnit * 1.6) * this.sizeh, 0, 1, 0)
		this.sliderVal = this.sliderPos
		pop()

	}
}

class Knob {

	constructor(posx, posy, sizew, sizeh, label, defaultPos, brightness = 1, quantize) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh

		this.defaultPos = defaultPos

		this.posy = posy
		this.posx = posx
		this.label = label
		this.labelVal = ""
		// this.knobPos = 0 - this.defaultPos
		this.knobPos = 0.5
		this.knobActive = false

		this.offsetx = 10
		this.offsety = 10

		this.mouse = mouseY
		this.mouseOld = mouseY
		this.deltaMouse = 0

		this.knobMinMax = 3 * (PI / 4)
		this.knobVal = 0
		this.label = str(label)

		this.quantize = 0

	}


	display() {

		push()
		translate(this.posx, this.posy)

		if(mouseDown) {
			if(dist(mouseX - width / 2, mouseY - height / 2, this.posx, this.posy) < ((standardUnit * .35) * this.sizew)) {
				this.knobActive = true
				this.deltaMouse = 0
				knobActive = true
			}
		}
		if(mouseUp == true) {
			this.knobActive = false
			knobActive = false
		}

		textAlign(CENTER)
		fill(globalWhite)
		text(this.label, 0, -(standardUnit * .34) * this.sizew)
		text(this.labelVal, 0, (standardUnit * .45) * this.sizew)

		stroke(globalWhite)
		noFill()

		this.mouse = mouseY
		this.deltaMouse = this.mouse - this.mouseOld

		if(this.knobActive) {
			this.knobPos -= this.deltaMouse * .007
		}
		if(this.knobActive == true && doubleClicked == true){
			this.knobPos = this.defaultPos
		}

		this.mouseOld = mouseY

		fill(0)
		circle(0, 0, ((standardUnit * .5)) * this.sizew)

		this.knobPos = constrain(this.knobPos, 0, 1)
		this.knobPosMapped = map(quantizePosition(this.knobPos, this.quantize, 1), 0, 1, -this.knobMinMax, this.knobMinMax)
		rotate(this.knobPosMapped)
		push()
		drawingContext.setLineDash([5, 5]);
		circle(0, 0, (standardUnit * .4) * this.sizew)
		strokeWeight(5)
		drawingContext.setLineDash([]);
		line(0, 0, 0, -(standardUnit * .25) * this.sizew)
		pop()
		pop()

		this.knobVal = quantizePosition(this.knobPos, this.quantize, 1)
	}
}


class WaveType {

	constructor(posx, posy, sizew, sizeh, label, defaultWav, brightness = 1) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.widthPx = (standardUnit * 2.6) * this.sizew

		this.label = label

		this.default

		this.unit = this.widthPx / 11

		this.sineWave = new Sine(0, 0, this.unit)
		this.triangleWave = new Triangle(0, 0, this.unit)
		this.sawWave = new Saw(0, 0, this.unit)
		this.squareWave = new Square(0, 0, this.unit)

		if(this.default == 0) {
			this.sineWave = new Sine(0, 0, this.unit, 1)
		}
		if(this.default == 1) {
			this.triangleWave = new Triangle(0, 0, this.unit, 1)
		}
		if(this.default == 2) {
			this.sawWave = new Saw(0, 0, this.unit, 1)
		}
		if(this.default == 3) {
			this.squareWave = new Square(0, 0, this.unit, 1)
		}
		this.shape = defaultWav

	}

	display() {
		push()
		translate(this.posx, this.posy)
		textAlign(CENTER)
		fill(globalWhite)
		text(this.label, this.widthPx * .5, -this.widthPx - standardUnit * .1)
		fill(0)
		stroke(globalWhite)
		strokeWeight(1)
		rect(0, 0, this.widthPx, -this.widthPx)
		this.sineWave.display()
		this.triangleWave.display()
		this.sawWave.display()
		this.squareWave.display()
		if(mouseDown) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.unit * 3, -this.unit * 8) < this.unit * 2) {
				this.shape = 0
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.unit * 8, -this.unit * 8) < this.unit * 2) {
				this.shape = 1
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.unit * 3, -this.unit * 3) < this.unit * 2) {
				this.shape = 2
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.unit * 8, -this.unit * 3) < this.unit * 2) {
				this.shape = 3
			}
		}
		if(this.shape == 0) {
			this.sineWave.select = true
			this.triangleWave.select = false
			this.sawWave.select = false
			this.squareWave.select = false
		}
		if(this.shape == 1) {
			this.sineWave.select = false
			this.triangleWave.select = true
			this.sawWave.select = false
			this.squareWave.select = false
		}
		if(this.shape == 2) {
			this.sineWave.select = false
			this.triangleWave.select = false
			this.sawWave.select = true
			this.squareWave.select = false
		}
		if(this.shape == 3) {
			this.sineWave.select = false
			this.triangleWave.select = false
			this.sawWave.select = false
			this.squareWave.select = true
		}
		pop()
	}

}

			fill(colActive)
		}

		vertex(this.unit, -this.unit * 3)
		vertex(this.unit * 2, -this.unit * 2)

		vertex(this.unit * 4, -this.unit * 2)

		pop()

class LFO {
	constructor(posx, posy, sizew, sizeh, label, brightness = .5) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy

		this.shape1 = 0
		this.shape2 = 0

		this.lfoSelect = new LFOselect(this.posx, this.posy, 1, 1)
		// this.lfo1 = new LFOVis(this.posx, this.posy, scaleUniv, scaleUniv, "LFO (Wobble wobble)", synthekinda1.settingsSynth.lfo.filterLfoShape)
		// this.lfo2 = new LFOVis(this.posx, this.posy, scaleUniv, scaleUniv, "LFO (Wobble wobble)", synthekinda1.settingsSynth.lfo.volLfoShape)
		this.lfo1 = new LFOVis(this.posx, this.posy, scaleUniv, scaleUniv, "LFO (Wobble)", 0)
		this.lfo2 = new LFOVis(this.posx, this.posy, scaleUniv, scaleUniv, "LFO (Wobble)", 0)

	}

	display() {
		if(this.lfoSelect.lfoIndex == 0) {
			this.lfo1.display()
		}
		if(this.lfoSelect.lfoIndex == 1) {
			this.lfo2.display()
		}
		this.lfoSelect.display()

		this.lfo1freq = this.lfo1.frequency
		this.lfo2freq = this.lfo2.frequency

		if(this.lfo1.lfoActive == true) {
			this.lfo1shape = this.lfo1.type.shape
		}
		if(this.lfo2.lfoActive == true) {
			this.lfo2shape = this.lfo2.type.shape
		}

		this.lfo1amp = this.lfo1.lfoDepthKnob.knobVal
		this.lfo2amp = this.lfo2.lfoDepthKnob.knobVal
	}

class LFOVis {

	constructor(posx, posy, sizew, sizeh, label, waveType, brightness = 1) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh

		this.defaultShape = 0

		this.waveType = this.defaultShape
		this.posy = posy
		this.posx = posx
		this.label = label
		this.cutoff = cutoff
		this.vertPos = this.posy
		this.speed = 0
		this.frequency = 1
		this.depth = 1
		this.depthOffset
		this.lfoTurbo = 1
		this.baseSpeed
		this.lockedSteps = [1/(16*3), (1/32)*1.5, 1/16, 1/(8*3), (1/16)*1.5, 1/8, 1/(4*3), (1/8)*1.5, 1/4, 1/(2*3), (1/4)*1.5, 1/2, 1/(1*3), (1/2)*1.5, 1/1]
		this.lockedStepNames = ["1/1", "1/2dot", "1/1tri", "1/2", "1/4dot", "1/2trip", "1/4", "1/8dot", "1/4trip", "1/8", "1/16dot", "1/8trip", "1/16", "1/32dot", "1/16trip"]

		this.type = new WaveType(this.posx + (standardUnit * 4) * this.sizew, this.posy + ((standardUnit * .6) * this.sizeh), this.sizew * .8, this.sizeh, "SHAPE", this.waveType)
		this.lfoSpeedKnob = new Knob(this.posx + (standardUnit * 7.5) * this.sizew, this.posy, 1.2, 1, "SPEED!", 0)
		this.lfoSpeedKnob.quantize = 1/(this.lockedSteps.length-1)
		this.lfoDepthKnob = new Knob(this.posx + (standardUnit * 9) * this.sizew, this.posy - (standardUnit * 1.3) * this.sizeh, 1.2, 1, "DEPTH!", 0)
		this.lfoTurboKnob = new Knob(this.posx + (standardUnit * 10.5) * this.sizew, this.posy, 1.2, 1, "TURBO!", 0)
	}

	display() {

		this.depthOffset = ((((standardUnit * 1.6) * this.sizeh) / 2) * this.depth)
		this.lfoTurboKnob.display()
		this.lfoTurbo = map(this.lfoTurboKnob.knobVal, 0, 1, 1, 2.5)

		this.lfoSpeedKnob.display()
		this.baseSpeed = bpm/(60/(this.lockedSteps[(this.lfoSpeedKnob.knobVal) * (this.lockedSteps.length-1)]))
		this.lfoSpeedKnob.labelVal = this.lockedStepNames[(this.lfoSpeedKnob.knobVal) * (this.lockedSteps.length-1)]
		this.lfoSpeed = map(this.baseSpeed, 0, 1, 0, 20 * this.lfoTurbo)
		this.lfoDepthKnob.display()

		this.lfoActive = false

		this.depth = 1 - this.lfoDepthKnob.knobVal
		this.frequency = this.lfoSpeed
		this.speed += (this.frequency / 60) //hz with 60 fps
		push()
		drawingContext.setLineDash([]);
		noStroke()
		fill(globalWhite)
		text(this.label, this.posx, this.posy - (standardUnit * 2.2) * this.sizeh)
		noFill()
		stroke(globalWhite)

		// this.type.shape = this.defaultShape

		beginShape()
		strokeWeight(1)
		stroke(10, 255, 160)
		if(this.type.shape == 0) {
			//Sine
			for(let i = 0; i < 3; i++) {
				bezier(this.posx + (standardUnit * i + standardUnit * 0) - (standardUnit * 1 * fract(this.speed)), this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * 0.25) - (standardUnit * 1 * fract(this.speed)), this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * .25) - (standardUnit * 1 * fract(this.speed)), this.posy - this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * .5) - (standardUnit * 1 * fract(this.speed)), this.posy - this.depthOffset)
				bezier(this.posx + (standardUnit * i + standardUnit * .5) - (standardUnit * 1 * fract(this.speed)), this.posy - this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * .75) - (standardUnit * 1 * fract(this.speed)), this.posy - this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * .75) - (standardUnit * 1 * fract(this.speed)), this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset,
					this.posx + (standardUnit * i + standardUnit * 1) - (standardUnit * 1 * fract(this.speed)), this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset)
			}
			this.lfoActive = true
		}
		if(this.type.shape == 1) {
			// triangle
			for(let i = 0; i < 6; i++) {
				if(i % 2 == 0) {
					this.vertPos = this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset
				} else {
					this.vertPos = this.posy - this.depthOffset
				}
				vertex(this.posx + (standardUnit * .5 * (i)) - (standardUnit * 1 * fract(this.speed)), this.vertPos)
			}
			this.lfoActive = true
		}
		if(this.type.shape == 2) {
			// saw
			for(let i = 0; i < 6; i++) {
				if(i % 2 == 0) {
					this.vertPos = this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset
				} else {
					this.vertPos = this.posy - this.depthOffset
				}
				vertex(this.posx + (standardUnit * 1 * (round(i * .5))) - (standardUnit * 1 * fract(this.speed)), this.vertPos)
			}
			this.lfoActive = true
		}
		if(this.type.shape == 3) {
			// square
			for(let i = 0; i < 12; i++) {
				if(floor(i * .5) % 2 == 0) {
					this.vertPos = this.posy - (standardUnit * 1.6) * this.sizeh + this.depthOffset
				} else {
					this.vertPos = this.posy - this.depthOffset
				}
				vertex(this.posx + (standardUnit * .5 * (round(i * .5))) - (standardUnit * 1 * fract(this.speed)), this.vertPos)
			}
			this.lfoActive = true
		}
		endShape()
		drawingContext.setLineDash([5, 5]);

		for(let i = 0; i < 4; i++) {
			stroke(160)
			strokeWeight(1)
			line(this.posx + i * standardUnit * this.sizew, this.posy, this.posx + i * standardUnit * this.sizew, this.posy - (standardUnit * 1.6) * this.sizeh)
		}
		push()
		noStroke()
		fill(0)
		erase()
		rect(this.posx, this.posy + 2, -(standardUnit * 2.1) * this.sizew, -(standardUnit * 2) * this.sizeh)
		rect(this.posx + (standardUnit * 3) * this.sizew, this.posy + 2, (standardUnit * 3) * this.sizew, -(standardUnit * 2) * this.sizeh)
		noErase()
		pop()
		drawingContext.setLineDash([]);
		stroke(globalWhite)
		rect(this.posx - ((standardUnit * .4) * this.sizew), this.posy + ((standardUnit * .6) * this.sizeh), (standardUnit * 4) * this.sizew, -(standardUnit * 2.6) * this.sizeh)
		fill(globalWhite)
		pop()

		this.type.display()
	}
}

		pop()

		rect(-((standardUnit * .4) * this.sizew), ((standardUnit * .6) * this.sizeh), (standardUnit * 4.3) * this.sizew, -(standardUnit * 2.5) * this.sizeh)

class Noise {

	constructor(posx, posy, sizew, sizeh, label, brightness = .5) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.widthPx = (standardUnit * 2) * this.sizew

		// this.noiseShape = synthekinda1.settingsSynth.source.shapeNoise
		this.noiseShape = 2

		this.label = label
		this.noisePos = []
		for(let i = 0; i < 20; i++) {
			this.noisePos.push(random(-this.widthPx / 12 * 4, -this.widthPx / 12 * 8))
		}
	}

	display() {
		push()
		translate(this.posx, this.posy)
		textAlign(CENTER)

		noFill()
		stroke(globalWhite)
		rect(0, 0, this.widthPx, -this.widthPx)
		strokeWeight(2)
		rect(this.widthPx / 12, -this.widthPx / 12, this.widthPx / 12 * 10, -this.widthPx / 12 * 10)
		beginShape()
		for(let i = 0; i < 20; i++) {
			let iMapped = map(i, 0, 19, this.widthPx / 12, this.widthPx / 12 * 11)
			vertex(iMapped, this.noisePos[i])
		}
		endShape()
		if(mouseDown) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.widthPx / 12 * 6, this.widthPx / 12 * 2.5) < this.widthPx / 12 * 2.5) {
				this.noiseShape = 0
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.widthPx / 12 * 6, this.widthPx / 12 * 9.5) < this.widthPx / 12 * 2.5) {
				this.noiseShape = 1
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, this.widthPx / 12 * 6, this.widthPx / 12 * 15.5) < this.widthPx / 12 * 2.5) {
				this.noiseShape = 2
			}
		}
		strokeWeight(1)
		push()
		if(this.noiseShape == 0) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(this.widthPx / 12, this.widthPx / 12, this.widthPx / 12 * 10, this.widthPx / 12 * 5)
		pop()
		push()
		if(this.noiseShape == 1) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(this.widthPx / 12, this.widthPx / 12 * 7, this.widthPx / 12 * 10, this.widthPx / 12 * 5)
		pop()
		push()
		if(this.noiseShape == 2) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(this.widthPx / 12, this.widthPx / 12 * 13, this.widthPx / 12 * 10, this.widthPx / 12 * 5)
		pop()
		blendMode(DIFFERENCE)

		fill(globalWhite)
		noStroke()
		text(this.label, this.widthPx * .5, -this.widthPx - standardUnit * .1)
		text("WHITE", this.widthPx / 12 * 6, this.widthPx / 12 * 4)
		text("PINK", this.widthPx / 12 * 6, this.widthPx / 12 * 10)
		text("BROWN", this.widthPx / 12 * 6, this.widthPx / 12 * 16)
		pop()

	}
}

class OctaveSelect {

	constructor(posx, posy, sizew, sizeh, label, brightness = .5) {

		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.widthPx = (standardUnit * 2) * this.sizew
		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.octaveIndex = 0
		this.octave = 1

		this.label = label

		this.noteUp = false
		this.noteDown = false

	}

	display() {
		push()
		translate(this.posx, this.posy)
		textAlign(CENTER)
		rectMode(CENTER)
		

		noFill()
		stroke(globalWhite)

		if(mouseDown) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, 0) < this.widthPx / 12 * 2.5) {
				this.octaveIndex = 3
				this.octave = 8
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * .4) < this.widthPx / 12 * 2.5) {
				this.octaveIndex = 2
				this.octave = 4
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * .8) < this.widthPx / 12 * 2.5) {
				this.octaveIndex = 1
				this.octave = 2
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * 1.2) < this.widthPx / 12 * 2.5) {
				this.octaveIndex = 0
				this.octave = 1
			}
		}

		strokeWeight(1)
		push()
		if(this.octaveIndex == 3) {
			this.octave = 8
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, 0, this.widthPx / 12 * 8, this.widthPx / 12 * 4)
		pop()
		push()
		if(this.octaveIndex == 2) {
			this.octave = 4
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * .4, this.widthPx / 12 * 8, this.widthPx / 12 * 4)
		pop()
		push()
		if(this.octaveIndex == 1) {
			this.octave = 2
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * .8, this.widthPx / 12 * 8, this.widthPx / 12 * 4)
		pop()
		push()
		if(this.octaveIndex == 0) {
			this.octave = 1
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * 1.2, this.widthPx / 12 * 8, this.widthPx / 12 * 4)
		pop()
		blendMode(DIFFERENCE)
		fill(globalWhite)
		noStroke()
		text(this.label, this.widthPx * .5, -this.widthPx - standardUnit * .1)
		text("OUCH", 0, standardUnit * .05)
		text("HIGH", 0, standardUnit * .45)
		text("MID", 0, standardUnit * .85)
		text("LOW", 0, standardUnit * 1.25)
		pop()
	}
}

		this.sizeh = sizeh

class Sequencer {
	constructor(posx, posy, sizew, sizeh, seqScale) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy

		this.x = 0
		this.x2 = 0

		this.seqLength = 32
		this.noteCount = 36

		this.seqUnitSize = width / 60

		this.sequencerTracks = []

		this.seq1note = 55

		this.brightnessActive = 255
		this.brightnessInactive = 100

		this.sequencerData = {
			sequencerSettings: {
				bpm: 10,
			},
			trackData: []
		}


		for(let i = 0; i < 4; i++) {
			this.sequencerTracks.push(new SequencerTrack(this.posx - standardUnit * .2, this.posy, this.sizew, this.sizew, this.seqUnitSize, i))
		}
		for(let i = 0; i < this.sequencerTracks.length; i++) {
			this.sequencerData.trackData.push(this.sequencerTracks[i].trackData)

		}
		this.functionSelect = new SeqFunctionSelect(this.posx + standardUnit * 4.5, this.posy - standardUnit * .55, this.sizew, this.sizew)

		this.seqModeSelect = new SeqModeSelect(this.posx + standardUnit * 3.35, this.posy + standardUnit * .25, this.sizew, this.sizew, "MODE")

		this.bpmKnob = new Knob(this.posx + standardUnit * 5.5, this.posy - standardUnit * 0.3, 1.5, 1.5, "BPM", 0.5)

	}
	display() {
		push()
		this.bpmKnob.display()
		this.bpm = floor(map(this.bpmKnob.knobVal, 0, 1, 20, 200))
		bpm = this.bpm

		this.functionSelect.display()
		this.seqModeSelect.display()

		if(!pause) {
			this.x += (this.bpm / 3600) * 4
		}
		if(this.x >= this.seqLength) {
			this.x = 0
		}

		for(let i = 0; i < 4; i++) {

			// synthekindas[i].noteLength = this.sequencerTracks[i].noteLength
			synthekindas[i].synth.chordMode = this.sequencerTracks[i].chord
			synthekindas[i].synth.freq = this.sequencerTracks[i].seqNote
			synthekindas[i].synth.freq2 = this.sequencerTracks[i].seqNote3rd
			synthekindas[i].synth.freq3 = this.sequencerTracks[i].seqNote5th
			synthekindas[i].gate = this.sequencerTracks[i].seqTrigger
		}
		
		for(this.s of this.sequencerTracks) {
			this.s.func = this.functionSelect.funcSelect
			this.s.chordMode = this.functionSelect.chordSelect
			this.s.changeChord = this.functionSelect.changeChord
			this.s.noteUp = this.functionSelect.noteUp
			this.s.noteDown = this.functionSelect.noteDown
			this.s.x = this.x
			this.s.display()
			this.s.notePlayedBlip = false
			this.s.noteKnobMapped = this.noteKnobMapped
			this.s.modeSelect = this.seqModeSelect.modeSelect
		}

		stroke(255, 0, 0)


		pop()
	}

	updateData() {
		for(let i = 0; i < this.sequencerTracks.length; i++) {
			this.sequencerTracks[i].updateTrackData()
			this.sequencerData.trackData[i] = this.sequencerTracks[i].trackData
		}
		this.sequencerData.sequencerSettings.bpm = this.bpmKnob.knobPos
	}
	loadData() {
		this.bpmKnob.knobPos = this.sequencerData.sequencerSettings.bpm
	}
}

class SequencerTrack {
	constructor(posx, posy, sizew, sizeh, seqScale, trackID) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy

		this.func
		this.chordMode
		this.chord = 0
		this.changeChord = false

		this.modeSelect = 2

		this.trackID = trackID

		this.x = 0
		this.xOld = 0

		this.seqLength = 32
		this.noteCount = 40

		this.seqUnitSize = width / 60

		this.notes = []
		this.noteUp
		this.noteDown

		for(let i = 0; i < this.noteCount; i++) {
			this.notes.push(32.70 * pow(2, i / 12)) // start at C#1
		}
		this.majorSkips = [1, 3, 6, 8, 10, 13, 15, 18, 20, 22, 25, 27, 30, 32, 34, 37, 39]
		this.minorSkips = [1, 4, 6, 9, 11, 13, 16, 18, 21, 23, 25, 28, 30, 33, 35, 37, 40]

		this.sequencerUnit = []

		this.noteHoldCounter = 0
		this.seqNote = 1
		this.seqNote3rd = 1
		this.seqNote5th = 1

		this.brightnessActive = 255
		this.brightnessInactive = 100

		this.unitBrightness = 1
		this.unitBrightnessAlt = false
		this.unitBrightnessAltCounter = 0

		for(let i = 0; i < this.seqLength; i++) {

			if(this.unitBrightnessAltCounter >= 4) {
				this.unitBrightnessAlt = !this.unitBrightnessAlt
				this.unitBrightnessAltCounter = 0
			}
			if(this.unitBrightnessAlt) {
				this.unitBrightness = .6
			} else {
				this.unitBrightness = 1
			}
			this.unitBrightnessAltCounter++

			this.sequencerUnit.push(new SequencerUnit((i * this.seqUnitSize) - width / 2 + this.posx + standardUnit, this.posy + standardUnit * (.6 * this.trackID) - standardUnit * .4, this.sizew, this.sizew, this.seqUnitSize, this.unitBrightness))
		}

		this.trackData = { active: [], note: [], chord: [] }
		this.trackDataActive = []
		this.trackDataNote = []

		for(let i = 0; i < this.sequencerUnit.length; i++) {
			this.trackData.active.push(this.sequencerUnit[i].active)
			this.trackData.note.push(this.sequencerUnit[i].note)
			this.trackData.chord.push(this.sequencerUnit[i].chord)
		}

		this.noteLengthKnob = new Knob(this.posx + standardUnit * 2.5, this.posy + standardUnit * (.6 * this.trackID) - standardUnit * .4, .8, 1, "", 0)
	}

	display() {
		push()
		fill(this.brightnessInactive)
		if(synthIndex == this.trackID){
			fill(this.brightnessActive)
		}
		textSize(fontSize * 1.3)
		text(str(this.trackID + 1), - width / 2 + this.posx + standardUnit * .3, this.posy + standardUnit * (.6 * this.trackID) - standardUnit * .25)
		this.seqTrigger = false
		// this.noteLengthKnob.display()
		// this.noteLength = map(this.noteLengthKnob.knobPos, 0, 1, .2, 5)

		this.sequencerUnit[floor(this.x)].notePlayedBlip = true

		if(this.noteUp == true || this.noteDown == true) {
			this.noteHoldCounter += .15
		}

		for(this.su of this.sequencerUnit) {
			this.su.func = this.func
			this.su.display()
			this.su.notePlayedBlip = false
			if(this.su.setActive == true) {
				if(this.noteUp == true && this.su.note < this.noteCount - 1) {

					if(this.modeSelect == 1) {
						for(let ms = 0; ms < this.majorSkips.length - 1; ms++) {
							if(this.su.note == this.majorSkips[ms]) {
								this.su.note++
							}
						}
					}
					if(this.modeSelect == 2) {
						for(let ms = 0; ms < this.minorSkips.length - 1; ms++) {
							if(this.su.note == this.minorSkips[ms]) {
								this.su.note++
							}
						}
					}

					this.su.note += floor(this.noteHoldCounter)
				}
				if(this.noteDown == true && this.su.note > 0) {

					if(this.modeSelect == 1) {
						for(let ms = 0; ms < this.majorSkips.length - 1; ms++) {
							if(this.su.note == this.majorSkips[ms]) {
								this.su.note--
							}
						}
					}
					if(this.modeSelect == 2) {
						for(let ms = 0; ms < this.minorSkips.length - 1; ms++) {
							if(this.su.note == this.minorSkips[ms]) {
								this.su.note--
							}
						}
					}


					this.su.note -= floor(this.noteHoldCounter)
				}
				if(this.changeChord) {
					this.su.chord = this.chordMode
				}
				if(this.su.active = true) {}
			}
			if(synthIndex == this.trackID) {
				this.su.brightness = this.brightnessActive
			} else {
				this.su.brightness = this.brightnessInactive
			}
		}
		if(mouseIsPressed && this.noteHoldCounter > 1) {
			this.noteHoldCounter = 0
		}
		if(mouseUp) {
			this.noteHoldCounter = 1
		}
		if(floor(this.x) != floor(this.xOld)) { //Make sure trig is not invoked every frame that playhead rests on active note, otherwise no retrigger on consequtive notes = muddy
			if(this.sequencerUnit[floor(this.x)].active == true) {
				this.seqTrigger = true
				this.seqNote = this.notes[this.sequencerUnit[floor(this.x)].note]
				this.seqNote3rd = this.notes[this.sequencerUnit[floor(this.x)].note3rd] //sequencer track sends current note to sequencer
				this.seqNote5th = this.notes[this.sequencerUnit[floor(this.x)].note5th]
				// this.seqNote3rd = 100
			}
		} else {
			this.seqTrigger = false
		}
		if(this.sequencerUnit[floor(this.x)].active == true) {
			this.chord = this.sequencerUnit[floor(this.x)].chord //chord needs to stay active otherwise no ring
		}
		this.xOld = this.x
		pop()
	}

	updateTrackData() {
		for(let i = 0; i < this.seqLength; i++) {
			this.trackData.active[i] = this.sequencerUnit[i].active
			this.trackData.note[i] = this.sequencerUnit[i].note
			this.trackData.chord[i] = this.sequencerUnit[i].chord
		}
	}
	loadTrackData() {
		for(let i = 0; i < this.seqLength; i++) {
			this.sequencerUnit[i].active = this.trackData.active[i]
			this.sequencerUnit[i].note = this.trackData.note[i]
			this.sequencerUnit[i].chord = this.trackData.chord[i]
		}
	}
}

class SequencerUnit {
	constructor(posx, posy, sizew, sizeh, seqScale, brightnessOffset) {

		this.brightness
		this.brightnessOffset = brightnessOffset
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.switch = 0

		this.active = false

		this.notePlayedBlip = false

		this.seqScale = seqScale

		this.brightness = 180
		this.color = 180

		this.func = 0
		this.chord = 0

		this.noteNames = ["C1", "C#1", "D1", "D#1", "E1", "F1", "F#1", "G1", "G#1", "A1", "A#1", "B1",
			"C2", "C#2", "D2", "D#2", "E2", "F2", "F#2", "G2", "G#2", "A2", "A#2", "B2",
			"C3", "C#3", "D3", "D#3", "E3", "F3", "F#3", "G3", "G#3", "A3", "A#3", "B3",
			"C4", "C#4", "D4", "D#4", "E4", "F4"
		]
		this.note = 12
		this.third = 3

	}
	display() {
		push()
		rectMode(CENTER)
		textAlign(CENTER)
		textSize(standardUnit * .2)
		translate(this.posx, this.posy)

		strokeWeight(1.5)
		if(this.notePlayedBlip == true) {
			strokeWeight(3)
		}
		fill(0)
		stroke(this.brightness * this.brightnessOffset)
		if(mouseIsPressed) {
			if(this.func == 0) {
				if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, 0) < this.seqScale / 2 && this.switch < 1 && knobActive == false) {
					this.active = !this.active
					this.switch++
				}
			}
			if(this.func == 1) {
				if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, 0) < this.seqScale / 2 && this.switch < 1 && knobActive == false) {
					this.setActive = !this.setActive
					this.switch++
				}
			}
		}
		if(this.active == false) {
			this.setActive = false
		}
		if(mouseUp) {
			this.switch = 0
		}

		rect(0, 0, this.seqScale * .95, this.seqScale * .5)

		if(this.active == true) {
			rect(0, 0, this.seqScale * .95, this.seqScale * .8)
			fill(255)
			noStroke()
			rect(0, map(this.note, 0, this.noteNames.length - 1, this.seqScale * .4, 0), this.seqScale * .95, map(this.note, 0, this.noteNames.length - 1, this.seqScale * .1, this.seqScale * .8))
			blendMode(DIFFERENCE)
			text(this.noteNames[this.note], 0, 0 + this.seqScale * .5 * .25)
			blendMode(BLEND)
			if(this.chord == 1) {
				push()
				stroke(0, 255, 200)
				noFill()
				strokeWeight(1)
				rect(0, 0, this.seqScale * .85, this.seqScale * .7)
				pop()
			}
			if(this.chord == 2) {
				push()
				stroke(255, 180, 100)
				noFill()
				strokeWeight(2)
				rect(0, 0, this.seqScale * .85, this.seqScale * .7)
				pop()
			}
		}
		if(this.setActive == true) {

			stroke(220, 0, 90)
			strokeWeight(2)
			noFill()
			rect(0, 0, this.seqScale * .95, this.seqScale * .8)
		}

		pop()

		this.note = constrain(this.note, 0, this.noteNames.length - 1)

		if(this.chord == 1) {
			this.third = 4
		}
		if(this.chord == 2) {
			this.third = 3
		}
		if(this.note < this.noteNames.length - 10) {
			this.note3rd = this.note + this.third
			this.note5th = this.note + 7
		} else {
			this.note3rd = this.note - this.third
			this.note5th = this.note - 7
		}

	}
}

class SeqFunctionSelect {

	constructor(posx, posy, sizew, sizeh, label, brightness = .5) {

		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.widthPx = (standardUnit * 2) * this.sizew

		this.funcSelect = 0
		this.changeChord = false

		this.label = label

		this.noteUp = false
		this.noteDown = false
		this.chordSelect = 4

	}

	display() {
		push()
		translate(this.posx, this.posy)
		textAlign(CENTER)
		rectMode(CENTER)

		noFill()
		stroke(globalWhite)
		//FUNCTION SELECTION
		if(mouseDown) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, 0) < this.widthPx / 12 * 2.5) {
				this.funcSelect = 0
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * .5) < this.widthPx / 12 * 2.5) {
				this.funcSelect = 1
			}
		}
		push()
		if(this.funcSelect == 0) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, 0, this.widthPx / 12 * 10, this.widthPx / 12 * 5)
		pop()
		strokeWeight(1)
		if(this.funcSelect == 1) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * .5, this.widthPx / 12 * 10, this.widthPx / 12 * 5)
		noFill()
		push()
		rect(this.widthPx / 12 * 5.5, this.widthPx / 12 * 18, this.widthPx / 12 * 22, this.widthPx / 12 * 17)
		pop()
		strokeWeight(1)
		//NOTECONTROLL
		if(mouseIsPressed) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * 1.1) < this.widthPx / 12 * 2.5 && this.noteDown == false && knobActive == false) {
				this.noteUp = true
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, 0, standardUnit * 1.48) < this.widthPx / 12 * 2.5 && this.noteUp == false && knobActive == false) {
				this.noteDown = true
			}
		} else {
			this.noteUp = false
			this.noteDown = false
		}
		push()
		if(this.noteUp) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * 1.1, this.widthPx / 12 * 7, this.widthPx / 12 * 4)
		
		pop()
		push()
		if(this.noteDown) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(0, standardUnit * 1.48, this.widthPx / 12 * 7, this.widthPx / 12 * 4)
		
		pop()

		if(mouseIsPressed) {
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, standardUnit * .9, standardUnit * 1.1) < this.widthPx / 12 * 2.5 && knobActive == false) {
				this.chordSelect = 0
				this.changeChord = true
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, standardUnit * .9, standardUnit * 1.5) < this.widthPx / 12 * 2.5 && knobActive == false) {
				this.chordSelect = 1
				this.changeChord = true
			}
			if(dist(mouseX - width / 2 - this.posx, mouseY - height / 2 - this.posy, standardUnit * .9, standardUnit * 1.9) < this.widthPx / 12 * 2.5 && knobActive == false) {
				this.chordSelect = 2
				this.changeChord = true
			}
		}
		if(mouseUp) {
			this.changeChord = false
		}
		push()
		if(this.chordSelect == 0 && this.changeChord == true) {
			strokeWeight(2)
			fill(colActive)
		}
		rect(standardUnit * .9, standardUnit * 1.1, this.widthPx / 12 * 8.5, this.widthPx / 12 * 4)
		pop()
		push()
		if(this.chordSelect == 1 && this.changeChord == true) {
			strokeWeight(2)
			fill(colActive)
		}
		stroke(0, 255, 200)
		rect(standardUnit * .9, standardUnit * 1.5, this.widthPx / 12 * 8.5, this.widthPx / 12 * 4)
		pop()
		push()
		if(this.chordSelect == 2 && this.changeChord == true) {
			strokeWeight(2)
			fill(colActive)
		}
		stroke(255, 180, 100)
		rect(standardUnit * .9, standardUnit * 1.9, this.widthPx / 12 * 8.5, this.widthPx / 12 * 4)
		pop()

		fill(globalWhite)
		noStroke()
		text(this.label, this.widthPx * .5, -this.widthPx - standardUnit * .1)
		blendMode(DIFFERENCE)

		//Notechange arrows
		beginShape()
		vertex(-this.widthPx / 12 * 2, standardUnit * 1.15)
		vertex(0, standardUnit * 1.02)
		vertex(this.widthPx / 12 * 2, standardUnit * 1.15)
		endShape()
		beginShape()
		vertex(-this.widthPx / 12 * 2, standardUnit * 1.4)
		vertex(0, standardUnit * 1.53)
		vertex(this.widthPx / 12 * 2, standardUnit * 1.4)
		endShape()

		text("ON/OFF", 0, standardUnit * .05)
		text("NOTE", 0, standardUnit * .55)
		text("single", standardUnit * .9, standardUnit * 1.14)
		text("major", standardUnit * .9, standardUnit * 1.54)
		text("minor", standardUnit * .9, standardUnit * 1.94)

		pop()
	}
}

				//userData[this.dropDownUser.selectedOption - 1] = this.dropDownUser.options[this.dropDownUser.selectedOption - 1]
				
				userData[this.dropDownUser.selectedOption] = this.dropDownUser.options[this.dropDownUser.selectedOption]
				// userData.push() = this.dropDownUser.options[this.dropDownUser.selectedOption]
				//userData = this.dropDownUser.options
				saveUserPreset()
				this.doNaming = false
			}
		}
		pop()
	}

	confirm(warning) {
		push()
		rectMode(CENTER)
		textAlign(CENTER)
		
		fill(0, 180)
		rect(0, 0, width, height)
		
		this.confirmButtonNO.display()
		this.confirmButtonYES.display()
		
		fill(255)
		noStroke()
		textSize(this.textS)
		text(warning, 0, -standardUnit * .5)
		if(this.confirmButtonNO.active == true){
			this.confirmYES = false
			this.confirmNO = true
			this.doWarning = false
		}
		if(this.confirmButtonYES.active == true){
			this.confirmNO = false
			this.confirmYES = true
			this.doWarning = false
		}
		pop()
	}
	name() {
		push()
		rectMode(CENTER)
		textAlign(CENTER)
		
		fill(0, 180)
		rect(0, 0, width, height)
		noFill()
		stroke(255)
		strokeWeight(1)
		rect(0, 0, standardUnit * 12 * this.sizew, standardUnit * this.selectSize * 2 * this.sizew)
		this.confirmNameButton.display()
		
		fill(255)
		noStroke()
		textSize(this.textS)
		text("I am nameless, give me one", 0, -standardUnit * 1)
		if(mouseDown){
		textInput.elt.focus()
		}
		
		if(textInput.value().length > 29){
			this.textInputScalar = (textInput.value().length - 29) * .8
			// this.textInputScalar = (textInput.value().length - 29) * .9
		}else{
			this.textInputScalar = 0
		}
		
		textSize(this.textS * 1.7 - this.textInputScalar)
		text(textInput.value(), 0, 0 + standardUnit * .1)
		
		if(this.confirmNameButton.active == true){
			this.doNaming = false
		}
		pop()
	}
}

class DropDown {
	constructor(posx, posy, sizew, sizeh, unitSizeX, unitSizeY, textS, posInt, initDisplay) {

		this.brightness = map(brightness, 0, 1, 0, globalWhite)
		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.posInt = posInt
		this.textS = textS

		this.unitSizeX = unitSizeX
		this.unitSizeY = unitSizeY

		this.options = []
		this.selectedOption = 0
		this.dropDownActive = false
		this.displayActive = initDisplay

	}
	display() {
		push()
		translate(this.posx, this.posy)

		textAlign(LEFT)
		rectMode(CENTER)
		textSize(this.textS)
		noStroke()
		fill(255)
		if(this.options.length > 0 && this.displayActive){
			// text(this.options[this.selectedOption].name.toUpperCase(), 0 - standardUnit * 1.2, 0 + standardUnit * .1)
			text("TEST", 0 - standardUnit * 1.2, 0 + standardUnit * .1)
		}else{
			text("Select Preset", 0 - standardUnit * 1.2, 0 + standardUnit * .1)
		}

		noFill()
		stroke(255)
		strokeWeight(1)
		rect(this.posInt, 0, standardUnit * this.sizew, standardUnit * this.unitSizeY * this.sizew)
		beginShape()
		vertex(this.posInt - standardUnit * .3 * this.sizew, -standardUnit * .15 * this.sizew)
		vertex(this.posInt, +standardUnit * .15 * this.sizew)
		vertex(this.posInt + standardUnit * .3 * this.sizew, -standardUnit * .15 * this.sizew)
		endShape()
		if(this.displayActive == true){
			strokeWeight(2.5)
		}
		rect(0, 0, standardUnit * 5.5 * this.sizew, standardUnit * this.unitSizeY * this.sizew)

		if(mouseDown) {
			if(dist(mouseX - width / 2, mouseY - height / 2, this.posx + this.posInt, this.posy) < standardUnit * .5 * this.sizew * 1) {
				this.dropDownActive = !this.dropDownActive
			}
		}
		this.selected = false
		if(this.dropDownActive == true) {
			for(let i = 0; i < this.options.length; i++) {
				strokeWeight(1)
				fill(0)
				if(this.selectedOption == i) {
					strokeWeight(2)
					fill(10)
				}
				stroke(255)

				rect(0, 0 + standardUnit * .55 * (i + 1), this.unitSizeX, standardUnit * this.sizew)
				
				rect(this.posInt, 0 + standardUnit * .55 * (i + 1), standardUnit * this.sizew, standardUnit * this.sizew)
				beginShape()
				vertex(this.posInt - standardUnit * .3 * this.sizew, standardUnit * .15 * this.sizew + standardUnit * .55 * (i + 1))
				vertex(this.posInt, -standardUnit * .15 * this.sizew + standardUnit * .55 * (i + 1))
				vertex(this.posInt + standardUnit * .3 * this.sizew, standardUnit * .15 * this.sizew + standardUnit * .55 * (i + 1))
				endShape()

				fill(255)
				noStroke()
				text(this.options[i].name.toUpperCase(), 0 - standardUnit * 1.2, 0 + standardUnit * .55 * (i + 1) + standardUnit * .065)
				if(mouseDown) {
					if(dist(mouseX - width / 2, mouseY - height / 2, this.posx + this.posInt, this.posy + standardUnit * .55 * (i + 1)) < standardUnit * .5 * this.sizew) {
						this.selectedOption = i
						this.displayActive = true
						this.dropDownActive = !this.dropDownActive
						this.selected = true
						
					}
				}
			}
		}
		pop()
	}
}

class MenuButton {
	constructor(posx, posy, sizew, sizeh, label, unitSizeX, unitSizeY, textS, holdable) {

		this.sizew = sizew
		this.sizeh = sizeh
		this.posx = posx
		this.posy = posy
		this.label = label
		this.textS = textS
		this.unitSizeX = unitSizeX
		this.unitSizeY = unitSizeY
		this.holdable = holdable
		this.toggle = false
		this.stroke = 1
	}

	display() {
		push()
		translate(this.posx, this.posy)
		rectMode(CENTER)
		textAlign(CENTER)
		textSize(this.textS)
		// textAlign(RIGHT)
		if(this.holdable == false){
			this.active = false
		}
		
		if(mouseDown) {
			if(dist(mouseX - width / 2, mouseY - height / 2, this.posx, this.posy) < standardUnit * .5 * this.sizew) {
				this.active = true
			}
		}
		if(mouseUp == true) {
			this.active = false
		}
		fill(0)
		strokeWeight(this.stroke)
		if(this.active == true || this.toggle == true) {
			strokeWeight(0)
			fill(colActive)
		}
		stroke(255)
		blendMode(DIFFERENCE)
		rect(0, 0, standardUnit * this.unitSizeX * this.sizew, standardUnit * this.unitSizeY * this.sizew)


		noStroke()
		fill(255)
		text(this.label, 0, 0 + standardUnit * .08)
		pop()
	}
}
